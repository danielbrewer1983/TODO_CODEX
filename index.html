<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile Todo Board</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="layout">
      <section class="panel form-panel">
        <h2>Add Todo</h2>
        <form id="todoForm" class="stack-form">
          <label>
            Task
            <input id="todoTitle" name="title" type="text" maxlength="120" placeholder="What needs to get done?" required>
          </label>
          <label>
            Category
            <select id="todoCategory" name="categoryId"></select>
          </label>
          <button class="primary-button" type="submit">Add Todo</button>
        </form>
      </section>

      <section class="panel board-panel">
        <div class="panel-heading">
          <div>
            <h2>Active Todos</h2>
            <p>Drag using the grip to reorder. Tap complete to archive.</p>
          </div>
          <span class="count-badge" id="activeCount">0</span>
        </div>
        <div id="todoList" class="todo-list" aria-live="polite"></div>
      </section>

      <section class="panel board-panel">
        <div class="panel-heading">
          <div>
            <h2>Archive</h2>
            <p>Completed items stay here with created and completed timestamps.</p>
          </div>
          <span class="count-badge archive" id="archiveCount">0</span>
        </div>
        <div id="archiveList" class="archive-list"></div>
        <div class="archive-footer">
          <button class="ghost-button archive-export-button" id="exportCsvButton" type="button">Export Archive CSV</button>
        </div>
      </section>
    </main>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <p></p>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
